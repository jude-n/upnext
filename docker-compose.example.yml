"""
Example docker-compose file for local development.

This is based on your existing `docker-compose.yml` and shows a typical setup
that includes the `upnext` app service plus a local Postgres database and an
Adminer UI for browsing the DB. Copy this to `docker-compose.yml` or use it as
`docker-compose -f docker-compose.example.yml up`.
"""
version: '3.8'

services:
  # Your app service (keeps the original configuration)
  upnext:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped

  # Local Postgres used for development
  db:
    image: postgres:15
    restart: always
    environment:
      # These default values can be overridden by a .env file
      POSTGRES_USER: ${POSTGRES_USER:-upnext_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecretpassword}
      POSTGRES_DB: ${POSTGRES_DB:-upnext_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-upnext_user} -d ${POSTGRES_DB:-upnext_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Lightweight DB UI for browsing and running queries
  adminer:
    image: adminer:latest
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  pgdata:

